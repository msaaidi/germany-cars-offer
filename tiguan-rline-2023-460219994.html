<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Germany Cars – Volkswagen Tiguan R-Line</title>

  <!--
    GERMANY CARS – MASTER TEMPLATE
    Design: B Magazine / Mobile Optimisé

    Utilisation rapide:
    1) Modifier uniquement le bloc OFFER_DATA ci-dessous.
    2) Mettre uniquement le prix final visible au client dans priceGermanyCarsEur.
    3) Si MCV disponible: mcv.available = true et remplir mcv.totalTaxesDh.
    4) Si MCV non disponible: mcv.available = false.
    5) Ne jamais ajouter de données vendeur.
  -->

  <style>
    :root{
      --bg:#060606;
      --panel:#101010;
      --soft:#171717;
      --gold:#d6b15f;
      --green:#15c66e;
      --red:#ff2d2d;
      --red-bg:rgba(255,45,45,.11);
      --text:#f8f6ef;
      --muted:#b8b3a6;
      --line:rgba(214,177,95,.24);
      --white-line:rgba(255,255,255,.12);
    }

    *{box-sizing:border-box}
    html{-webkit-text-size-adjust:100%;scroll-behavior:smooth}
    body{
      margin:0;
      background:#050505;
      color:var(--text);
      font-family:Inter,Arial,sans-serif;
      background-image:
        radial-gradient(circle at 20% 0,rgba(214,177,95,.20),transparent 28%),
        radial-gradient(circle at 90% 20%,rgba(21,198,110,.11),transparent 22%);
    }
    img{max-width:100%}
    .page{max-width:1280px;margin:auto;padding:32px 18px 58px}

    .brand{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:18px;
      margin-bottom:28px
    }
    .brand h1{
      margin:0;
      text-transform:uppercase;
      font-size:clamp(38px,6vw,82px);
      letter-spacing:-2px;
      line-height:.95
    }
    .brand h1 span{color:var(--gold)}
    .brand p{
      color:var(--muted);
      text-align:right;
      text-transform:uppercase;
      letter-spacing:2px;
      font-size:12px
    }

    .hero{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:22px;
      align-items:stretch
    }
    .hero-photo{
      border-radius:36px;
      overflow:hidden;
      min-height:620px;
      position:relative;
      border:1px solid var(--line);
      box-shadow:0 30px 110px rgba(0,0,0,.52);
      background:linear-gradient(135deg,#111,#050505)
    }
    .hero-photo img{
      width:100%;
      height:100%;
      object-fit:cover;
      display:block
    }
    .hero-photo.empty{
      display:flex;
      align-items:center;
      justify-content:center;
      color:var(--muted);
      padding:30px;
      text-align:center;
      font-weight:900;
      letter-spacing:1.5px;
      text-transform:uppercase
    }
    .hero-photo:after{
      content:'';
      position:absolute;
      inset:0;
      pointer-events:none;
      background:linear-gradient(180deg,rgba(0,0,0,0) 42%,rgba(0,0,0,.72))
    }

    .hero-copy{
      border:1px solid var(--line);
      border-radius:36px;
      background:linear-gradient(145deg,rgba(16,16,16,.96),rgba(9,9,9,.96));
      padding:38px;
      display:flex;
      flex-direction:column;
      justify-content:space-between
    }
    .kicker{
      color:var(--gold);
      letter-spacing:2.4px;
      text-transform:uppercase;
      font-weight:900;
      font-size:12px
    }
    .car-title{
      font-size:clamp(42px,5vw,72px);
      line-height:.96;
      margin:12px 0 14px;
      font-weight:950
    }
    .sub{color:var(--muted);font-size:19px;line-height:1.45}

    .price{
      margin:32px 0;
      padding:28px;
      border-radius:30px;
      border:1px solid rgba(21,198,110,.42);
      background:rgba(21,198,110,.10)
    }
    .price span{
      display:block;
      color:#b9f8d5;
      text-transform:uppercase;
      letter-spacing:1.7px;
      font-size:12px;
      font-weight:900
    }
    .price strong{
      display:block;
      color:var(--green);
      font-size:clamp(54px,6vw,88px);
      line-height:1;
      margin-top:8px
    }

    .stats{
      display:grid;
      grid-template-columns:repeat(2,1fr);
      gap:12px
    }
    .stats div{
      padding:16px;
      border:1px solid var(--white-line);
      background:rgba(255,255,255,.045);
      border-radius:18px
    }
    .stats strong{display:block;font-size:22px}
    .stats span{color:var(--muted);font-size:13px}

    .section{
      margin-top:28px;
      border:1px solid var(--line);
      border-radius:34px;
      background:rgba(14,14,14,.88);
      padding:30px
    }
    .section-title span{
      display:block;
      color:var(--gold);
      text-transform:uppercase;
      letter-spacing:2px;
      font-size:12px;
      font-weight:900;
      margin-bottom:6px
    }
    .section h2{
      font-size:34px;
      margin:0 0 22px;
      line-height:1.1
    }
    .section h2 span{color:var(--gold)}

    .details{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:12px
    }
    .detail{
      padding:16px;
      border:1px solid rgba(255,255,255,.10);
      background:rgba(255,255,255,.04);
      border-radius:18px;
      min-height:84px
    }
    .detail span{
      display:block;
      color:var(--muted);
      font-size:12px;
      text-transform:uppercase;
      letter-spacing:.7px
    }
    .detail strong{
      display:block;
      color:#fff;
      font-size:18px;
      margin-top:7px;
      line-height:1.35
    }

    .chips{
      display:grid;
      grid-template-columns:repeat(4,1fr);
      gap:10px
    }
    .chip{
      border:1px solid rgba(255,255,255,.11);
      background:rgba(255,255,255,.045);
      padding:14px;
      border-radius:16px;
      line-height:1.4
    }
    .chip:before{content:'◆ ';color:var(--gold)}

    .mosaic{
      display:grid;
      grid-template-columns:repeat(6,1fr);
      grid-auto-rows:150px;
      gap:12px
    }
    .tile{
      position:relative;
      overflow:hidden;
      border-radius:20px;
      border:1px solid var(--line);
      background:#111;
      min-height:150px
    }
    .tile img{
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
      transition:.35s
    }
    .tile:hover img{transform:scale(1.04);filter:brightness(1.1)}
    .tile span{
      position:absolute;
      right:10px;
      bottom:10px;
      background:rgba(0,0,0,.65);
      color:#fff;
      border:1px solid rgba(255,255,255,.2);
      border-radius:999px;
      padding:5px 9px;
      font-size:12px;
      font-weight:900
    }
    .t1,.t6{grid-column:span 3;grid-row:span 2}
    .t2,.t3,.t4,.t5,.t7{grid-column:span 2}

    .mcv-top{
      display:grid;
      grid-template-columns:.9fr 1.1fr;
      gap:16px
    }
    .mcv-total{
      border:1px solid rgba(21,198,110,.42);
      border-radius:24px;
      padding:24px;
      background:rgba(21,198,110,.10)
    }
    .mcv-total span{
      display:block;
      color:#b9f8d5;
      text-transform:uppercase;
      letter-spacing:1.4px;
      font-size:12px;
      font-weight:900
    }
    .mcv-total strong{
      display:block;
      color:var(--green);
      font-size:56px;
      margin-top:8px;
      line-height:1.05
    }
    .mcv-meta{
      border:1px solid rgba(255,255,255,.10);
      border-radius:24px;
      padding:18px;
      background:rgba(255,255,255,.035)
    }
    .mcv-meta p{margin:7px 0;color:#e9e3d2;line-height:1.45}

    .cost-summary{margin-top:18px;display:block}
    .cost-main{
      padding:34px 30px;
      border-radius:30px;
      border:1px solid rgba(21,198,110,.42);
      background:linear-gradient(135deg,rgba(21,198,110,.18),rgba(255,255,255,.05));
      text-align:center;
      box-shadow:0 18px 50px rgba(0,0,0,.25)
    }
    .cost-main span{
      display:block;
      color:#b9f8d5;
      text-transform:uppercase;
      letter-spacing:1.8px;
      font-size:13px;
      font-weight:900
    }
    .cost-main strong{
      display:block;
      color:var(--green);
      font-size:clamp(56px,7vw,96px);
      line-height:1.02;
      margin-top:12px
    }
    .cost-lines{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:10px;
      margin-top:14px
    }
    .cost-lines div{
      padding:16px 18px;
      border-radius:20px;
      border:1px solid rgba(255,255,255,.12);
      background:rgba(255,255,255,.045)
    }
    .cost-lines span{display:block;color:var(--muted);font-size:13px}
    .cost-lines strong{font-size:24px}

    .attention{
      border:2px solid rgba(255,45,45,.72);
      background:
        linear-gradient(135deg,rgba(255,45,45,.17),rgba(255,255,255,.04)),
        var(--red-bg);
      border-radius:28px;
      padding:28px;
      color:#fff;
      box-shadow:0 22px 70px rgba(255,45,45,.10)
    }
    .attention h2{
      margin:0 0 14px;
      color:var(--red);
      text-transform:uppercase;
      font-size:clamp(32px,5vw,56px)
    }
    .attention p,.attention li{
      font-size:20px;
      line-height:1.45;
      font-weight:800
    }
    .attention ul{margin:12px 0 0;padding-left:24px}

    .fineprint,.footer{color:var(--muted)}
    .fineprint{line-height:1.55}
    .footer{text-align:center;margin-top:34px}
    .footer b{color:var(--gold)}

    @media(max-width:900px){
      .brand,.hero{display:block}
      .brand p{text-align:left}
      .hero-copy{margin-top:18px}
      .hero-photo{min-height:420px}
      .details{grid-template-columns:1fr 1fr}
      .chips{grid-template-columns:1fr 1fr}
      .mcv-top{grid-template-columns:1fr}
      .cost-lines{grid-template-columns:1fr}
      .mosaic{grid-template-columns:repeat(2,1fr);grid-auto-rows:170px}
      .tile,.t1,.t2,.t3,.t4,.t5,.t6,.t7{grid-column:span 1;grid-row:span 1}
    }

    @media(max-width:760px){
      .page{padding:16px 12px 38px}
      .brand{
        display:flex;
        flex-direction:column;
        align-items:flex-start;
        gap:8px;
        margin-bottom:18px
      }
      .brand h1{font-size:clamp(34px,12vw,56px);letter-spacing:-1.4px}
      .brand p{font-size:11px;letter-spacing:1.4px}
      .hero{gap:14px}
      .hero-photo{min-height:300px;border-radius:26px}
      .hero-copy{padding:22px;border-radius:26px}
      .kicker{font-size:11px;letter-spacing:2px}
      .car-title{font-size:clamp(34px,10vw,48px);margin:10px 0}
      .sub{font-size:15px}
      .price{margin:20px 0;padding:22px;border-radius:22px}
      .price strong{font-size:clamp(42px,12vw,62px)}
      .stats{grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}
      .stats div{padding:14px}
      .stats strong{font-size:18px}
      .section{margin-top:20px;padding:22px;border-radius:26px}
      .section h2{font-size:28px;margin-bottom:18px}
      .details{grid-template-columns:1fr;gap:10px}
      .detail{min-height:auto;padding:14px}
      .detail strong{font-size:17px}
      .chips{grid-template-columns:1fr;gap:10px}
      .chip{padding:13px 14px}
      .mcv-total,.mcv-meta{padding:18px;border-radius:20px}
      .mcv-total strong{font-size:40px}
      .mcv-meta p{font-size:14px}
      .cost-main{padding:24px 18px;border-radius:24px}
      .cost-main span{font-size:12px;letter-spacing:1.3px}
      .cost-main strong{font-size:clamp(42px,11vw,58px)}
      .cost-lines div{padding:14px 16px}
      .cost-lines strong{font-size:22px}
      .attention{padding:22px;border-radius:24px}
      .attention p,.attention li{font-size:17px}
      .fineprint{font-size:13px}
      .footer{margin-top:24px;font-size:13px;line-height:1.5}
    }

    @media(max-width:560px){
      .page{padding:14px 10px 34px}
      .hero-photo{min-height:260px}
      .hero-copy,.section{padding:18px;border-radius:22px}
      .price strong{font-size:clamp(40px,13vw,54px)}
      .stats{grid-template-columns:repeat(2,minmax(0,1fr))}
      .stats strong{font-size:17px}
      .stats span{font-size:12px}
      .mosaic{
        display:flex;
        overflow-x:auto;
        gap:12px;
        grid-auto-rows:auto;
        padding-bottom:6px;
        scroll-snap-type:x mandatory;
        -webkit-overflow-scrolling:touch
      }
      .mosaic::-webkit-scrollbar{height:8px}
      .mosaic::-webkit-scrollbar-thumb{background:rgba(214,177,95,.35);border-radius:99px}
      .tile,.t1,.t2,.t3,.t4,.t5,.t6,.t7{
        flex:0 0 84vw;
        min-width:84vw;
        height:220px;
        grid-column:auto;
        grid-row:auto;
        scroll-snap-align:start;
        border-radius:18px
      }
      .tile span{font-size:11px;padding:4px 8px}
      .mcv-total strong{font-size:36px}
      .cost-main strong{font-size:clamp(38px,12vw,52px)}
    }
  </style>
</head>

<body>
  <main class="page">
    <header class="brand">
      <h1 id="brandTitle">Germany <span>Cars</span></h1>
      <p id="brandSubtitle">Offre premium · Import Maroc</p>
    </header>

    <section class="hero">
      <div id="heroPhoto" class="hero-photo"></div>

      <div class="hero-copy">
        <div>
          <div class="kicker" id="vehicleKicker">SUV Diesel · Automatique</div>
          <div class="car-title" id="vehicleTitle">Véhicule Germany Cars</div>
          <p class="sub" id="vehicleSubtitle">Offre personnalisée pour import au Maroc</p>
        </div>

        <div class="price">
          <span>Prix Germany Cars</span>
          <strong id="priceGermany">—</strong>
        </div>

        <div class="stats" id="quickStats"></div>
      </div>
    </section>

    <section class="section">
      <h2>Détails du <span>véhicule</span></h2>
      <div class="details" id="vehicleDetails"></div>
    </section>

    <section class="section">
      <h2>Équipements <span>principaux</span></h2>
      <div class="chips" id="vehicleFeatures"></div>
    </section>

    <section class="section">
      <h2>Galerie <span>magazine</span></h2>
      <div class="mosaic" id="vehicleGallery"></div>
    </section>

    <section class="section" id="mcvSection"></section>

    <footer class="footer">
      <b>Germany Cars</b> · Sélection, achat et accompagnement automobile vers le Maroc
    </footer>
  </main>

  <script>
    const OFFER_DATA = {
      "brand": {
            "titleHtml": "Germany <span>Cars</span>",
            "subtitle": "Offre premium · Import Maroc"
      },
      "vehicle": {
            "make": "VOLKSWAGEN",
            "model": "TIGUAN",
            "fullTitle": "Volkswagen Tiguan R-Line",
            "version": "2.0 TDI R-Line DSG",
            "subtitle": "R-Line 2.0 TDI DSG · Navigation · LED · ACC · Caméra · Attelage",
            "kicker": "SUV Diesel · Automatique DSG",
            "category": "SUV / 4x4 / Pick-up",
            "mileage": "38 225 km",
            "firstRegistration": "11/2023",
            "fuel": "Diesel",
            "power": "110 kW / 150 ch",
            "gearbox": "Automatique DSG 7 rapports",
            "engineSize": "1 968 cm³",
            "emissionClass": "Euro 6d",
            "color": "Blanc Pure White",
            "interior": "Tissu / microfibre ArtVelours noir",
            "seats": "5",
            "doors": "4/5",
            "owners": "1",
            "co2": "155 g/km",
            "lastService": "",
            "warranty": "Garantie disponible selon l’annonce"
      },
      "pricing": {
            "priceGermanyCarsEur": 34290,
            "exchangeRateDhPerEur": 11
      },
      "mcv": {
            "available": true,
            "consultationDate": "09/07/2026 à 03:34",
            "beneficiary": "Autre — dédouanement dans le cadre du droit commun",
            "vehicleGenre": "Tourisme non hybride",
            "modelMcv": "TIGUAN 2.0 TDI R LINE (150CH)",
            "vehicleType": "CT",
            "totalTaxesDh": 202664
      },
      "images": [
            "https://img.classistatic.de/api/v1/mo-prod/images/e1/e13f7ac6-844d-4743-9785-d7d600078bb1?rule=mo-1024",
            "https://img.classistatic.de/api/v1/mo-prod/images/e1/e1dd0e62-5fda-450c-bfcb-39aa0df00053?rule=mo-1024",
            "https://img.classistatic.de/api/v1/mo-prod/images/fd/fd1337d9-a60d-4a7e-998a-197789abfb40?rule=mo-1024",
            "https://img.classistatic.de/api/v1/mo-prod/images/13/1307c707-1f71-4019-9c80-b28bf4d11a45?rule=mo-1024",
            "https://img.classistatic.de/api/v1/mo-prod/images/36/3618ae34-41c6-40a1-95b0-edd6e4244471?rule=mo-1024",
            "https://img.classistatic.de/api/v1/mo-prod/images/15/15fb26a1-af27-4649-81b5-c3556d94fba6?rule=mo-1024",
            "https://img.classistatic.de/api/v1/mo-prod/images/79/79ed0097-c8c0-4ff4-8de3-7ee7cfae68be?rule=mo-1024",
            "https://img.classistatic.de/api/v1/mo-prod/images/4f/4f975c7b-d8ce-4ab7-867c-9d1f6c76cd2b?rule=mo-1024",
            "https://img.classistatic.de/api/v1/mo-prod/images/a1/a17ad5a1-e414-4782-9e2e-13df839a6b8f?rule=mo-1024",
            "https://img.classistatic.de/api/v1/mo-prod/images/5f/5f18cbb6-38fd-4d13-b507-0bc80d8f83ef?rule=mo-1024",
            "https://img.classistatic.de/api/v1/mo-prod/images/6c/6c9df5a6-db5f-4bd2-8a28-e28290e4e19b?rule=mo-1024",
            "https://img.classistatic.de/api/v1/mo-prod/images/e1/e1ea4555-5719-4ae9-9c0a-97d0d5dd076d?rule=mo-1024",
            "https://img.classistatic.de/api/v1/mo-prod/images/b6/b66df7df-1eab-413e-b3b8-2c8ece6ae259?rule=mo-1024",
            "https://img.classistatic.de/api/v1/mo-prod/images/80/8012cdaa-4557-44b5-8a5e-b65d7c112b09?rule=mo-1024",
            "https://img.classistatic.de/api/v1/mo-prod/images/e8/e8476d5b-f9b5-4dc5-ad27-379efe356478?rule=mo-1024"
      ],
      "features": [
            "Pack extérieur et intérieur R-Line",
            "Boîte automatique DSG 7 rapports",
            "Système de navigation Discover Media",
            "Phares LED et feux de jour LED",
            "Régulateur de distance ACC avec Stop&Go",
            "Caméra de recul et aide au stationnement avant/arrière",
            "Attelage pivotant",
            "Chauffage stationnaire avec ventilation stationnaire",
            "Cockpit digital",
            "Apple CarPlay et Android Auto sans fil",
            "Climatisation automatique 3 zones",
            "Sièges chauffants avant et arrière",
            "Volant multifonction chauffant avec palettes",
            "Assistant de maintien de voie",
            "Reconnaissance des panneaux de signalisation",
            "Radio DAB+, Bluetooth, USB-C et recharge sans fil"
      ]
};

    const formatDh = (value) => {
      if (value === null || value === undefined || value === "" || isNaN(Number(value))) return "—";
      return new Intl.NumberFormat("fr-FR", { maximumFractionDigits: 0 }).format(Number(value)).replace(/\u202f/g, " ") + " DH";
    };

    const formatEur = (value) => {
      if (value === null || value === undefined || value === "" || isNaN(Number(value))) return "—";
      return new Intl.NumberFormat("fr-FR", { maximumFractionDigits: 0 }).format(Number(value)).replace(/\u202f/g, " ") + " €";
    };

    const textOrDash = (value) => value && String(value).trim() ? value : "—";

    function setText(id, value) {
      const el = document.getElementById(id);
      if (el) el.textContent = textOrDash(value);
    }

    function render() {
      const data = OFFER_DATA;
      const v = data.vehicle;
      const pricing = data.pricing;
      const mcv = data.mcv;

      document.getElementById("brandTitle").innerHTML = data.brand.titleHtml || "Germany <span>Cars</span>";
      setText("brandSubtitle", data.brand.subtitle);
      setText("vehicleKicker", v.kicker);
      setText("vehicleTitle", v.fullTitle);
      setText("vehicleSubtitle", v.subtitle);
      setText("priceGermany", formatEur(pricing.priceGermanyCarsEur));

      const hero = document.getElementById("heroPhoto");
      const heroUrl = (data.images || []).filter(Boolean)[0];
      if (heroUrl) {
        hero.innerHTML = `<img src="${heroUrl}" alt="${v.fullTitle || 'Véhicule'}">`;
      } else {
        hero.classList.add("empty");
        hero.textContent = "Photo véhicule";
      }

      const stats = [
        [v.mileage, "Kilométrage"],
        [v.firstRegistration, "Première immatriculation"],
        [v.power, "Puissance"],
        [v.gearbox, "Boîte de vitesses"]
      ];
      document.getElementById("quickStats").innerHTML = stats.map(([value,label]) =>
        `<div><strong>${textOrDash(value)}</strong><span>${label}</span></div>`
      ).join("");

      const details = [
        ["Marque / Modèle", v.fullTitle],
        ["Version", v.version],
        ["Catégorie", v.category],
        ["Kilométrage", v.mileage],
        ["Première immatriculation", v.firstRegistration],
        ["Carburant", v.fuel],
        ["Puissance", v.power],
        ["Boîte de vitesses", v.gearbox],
        ["Cylindrée", v.engineSize],
        ["Norme antipollution", v.emissionClass],
        ["Couleur", v.color],
        ["Intérieur", v.interior],
        ["Places", v.seats],
        ["Portes", v.doors],
        ["Propriétaires", v.owners],
        ["CO₂", v.co2],
        ["Dernier entretien", v.lastService],
        ["Garantie", v.warranty]
      ].filter(([,value]) => value && String(value).trim());

      document.getElementById("vehicleDetails").innerHTML = details.map(([label,value]) =>
        `<div class="detail"><span>${label}</span><strong>${textOrDash(value)}</strong></div>`
      ).join("");

      const features = (data.features || []).filter(Boolean);
      document.getElementById("vehicleFeatures").innerHTML = features.map(item =>
        `<div class="chip">${item}</div>`
      ).join("");

      const tileClasses = ["t1","t2","t3","t4","t5","t6","t7"];
      const images = (data.images || []).filter(Boolean);
      document.getElementById("vehicleGallery").innerHTML = images.length ? images.map((url, index) => {
        const cls = tileClasses[index % tileClasses.length];
        const num = String(index + 1).padStart(2, "0");
        return `<a class="tile ${cls}" href="${url}" target="_blank" rel="noopener">
          <img src="${url}" alt="Photo véhicule ${num}">
          <span>${num}</span>
        </a>`;
      }).join("") : `<div class="tile t1"><span>—</span></div>`;

      const mcvSection = document.getElementById("mcvSection");

      if (mcv.available && Number(mcv.totalTaxesDh) > 0) {
        const convertedVehicleDh = Number(pricing.priceGermanyCarsEur || 0) * Number(pricing.exchangeRateDhPerEur || 11);
        const totalBeforeTransportDh = convertedVehicleDh + Number(mcv.totalTaxesDh || 0);

        mcvSection.innerHTML = `
          <div class="section-title"><span>Droits & taxes</span><h2>MCV Maroc</h2></div>
          <div class="mcv-top">
            <div class="mcv-total">
              <span>Montant total des droits et taxes</span>
              <strong>${formatDh(mcv.totalTaxesDh)}</strong>
            </div>
            <div class="mcv-meta">
              <p><b>Consultation MCV :</b> ${textOrDash(mcv.consultationDate)}</p>
              <p><b>Bénéficiaire :</b> ${textOrDash(mcv.beneficiary)}</p>
              <p><b>Véhicule :</b> ${textOrDash(mcv.vehicleGenre)}</p>
              <p><b>Modèle MCV :</b> ${textOrDash(mcv.modelMcv)}</p>
              <p><b>Type du véhicule :</b> ${textOrDash(mcv.vehicleType)}</p>
            </div>
          </div>
          <div class="cost-summary">
            <div class="cost-main">
              <span>Coût total avant transport et service</span>
              <strong>${formatDh(totalBeforeTransportDh)}</strong>
            </div>
            <div class="cost-lines">
              <div><span>Prix du véhicule en Allemagne</span><strong>${formatEur(pricing.priceGermanyCarsEur)}</strong></div>
              <div><span>Prix converti en dirhams</span><strong>${formatDh(convertedVehicleDh)}</strong></div>
              <div><span>Droits et taxes au Maroc</span><strong>${formatDh(mcv.totalTaxesDh)}</strong></div>
            </div>
          </div>
          <p class="fineprint">
            Calcul basé sur un taux indicatif de 1 € = ${pricing.exchangeRateDhPerEur || 11} DH.
            Total hors transport, hors frais administratifs/documents et hors service Germany Cars.
          </p>
        `;
      } else {
        mcvSection.innerHTML = `
          <div class="attention">
            <h2>Attention :</h2>
            <p>Le prix affiché concerne uniquement l’achat du véhicule.</p>
            <p>Ne sont pas inclus :</p>
            <ul>
              <li>Les frais de douane au Maroc</li>
              <li>Les frais de transport</li>
              <li>Les frais administratifs, documents et service</li>
            </ul>
          </div>
        `;
      }
    }

    render();
  </script>
</body>
</html>
